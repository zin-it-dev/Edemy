services:
  worker:
    build: ./server
    container_name: celery-worker
    entrypoint: ./scripts/worker.entrypoint.sh
    volumes:
      - ./server:/app
    env_file:
      - .env
    depends_on:
      - redis
      - db

  beat:
    build: ./server
    container_name: celery-beat
    entrypoint: ./scripts/beat.entrypoint.sh
    volumes:
      - ./server:/app
    env_file:
      - .env
    depends_on:
      - redis
      - db
      - web

  flower:
    build: ./server
    container_name: celery-flower
    command: ./scripts/flower.entrypoint.sh
    volumes:
      - ./server:/app
    env_file:
      - .env
    ports:
      - 5555:5555
    depends_on:
      - redis
      - db
      - web

  elasticsearch:
    container_name: elasticsearch
    image: elasticsearch:7.14.2
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    volumes:
      - esdata:/usr/share/elasticsearch/data
    ports:
      - 9200:9200

  redis:
    image: redis:latest
    container_name: redis
    restart: always
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data

  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env

  web:
    build: ./server
    volumes:
      - ./server:/app
    ports:
      - 8000:8000
    env_file:
      - .env
    depends_on:
      - db
      - redis
      - elasticsearch

  # nginx:
  #   build: ./nginx
  #   ports:
  #     - 1337:80
  #   depends_on:
  #     - web

volumes:
  postgres_data:
  redis_data:
  esdata:
